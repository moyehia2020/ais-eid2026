<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>تصميم دعوة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    text-align: center;
}

input, button {
    padding: 12px;
    width: 300px;
    margin: 8px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-family: 'Cairo';
}
button{
    width: 150px;
}
button {
    background: #171440;
    color: #fff;
    border: none;
    cursor: pointer;
}

canvas {
    margin-top: 20px;
    max-width: 90%;
}
</style>
</head>

<body>


<div><img src="ais-logo-with-name.png" style="width: 300px;">
</div>
<h2>Create Your Official Eid Greeting</h2>

<input type="text" id="name" placeholder="Name"><br>
<input type="text" id="job" placeholder=" Job Title"><br>

<button onclick="generateImage()">Create</button>
<button onclick="downloadImage()">Download</button>

<br>
<canvas id="canvas" width="1080" height="1080"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const background = new Image();
background.src = "AIS.jpeg";

background.onload = function () {
    draw();
};

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(background,0,0,canvas.width,canvas.height);
}

function generateImage() {
    draw();

    const name = document.getElementById("name").value;
    const job = document.getElementById("job").value;

    ctx.textAlign = "center";
    ctx.shadowBlur = 10;

    ctx.fillStyle = "#09114f";
    ctx.font = "bold 55px Cairo";
    ctx.fillText(name, 540, 750);

    ctx.fillStyle = "#444";
    ctx.font = "35px Cairo";
    ctx.fillText(job, 540, 820);
}

function downloadImage() {
    try {
        const link = document.createElement("a");
        link.download = "invite.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    } catch (err) {
        alert("❌ خطاء");
    }
}
</script>

</body>
</html>
